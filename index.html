<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ С 8 Марта ✨</title>
    <style>
      /* ===== СБРОС И БАЗОВЫЕ НАСТРОЙКИ ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        cursor: none; /* прячем стандартный курсор */
      }

      body {
        background: linear-gradient(145deg, #fce4e8 0%, #ffe6f0 40%, #fff0f5 100%);
        font-family:
          'Segoe UI',
          'Roboto',
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        position: relative;
        overflow-x: hidden;
      }

      /* ===== ПЕРЕЛИВАЮЩИЙСЯ КУРСОР-КРУЖОК ===== */
      .cursor-glow {
        position: fixed;
        width: 48px;
        height: 48px;
        background: radial-gradient(circle at 30% 30%, rgba(255, 200, 235, 0.9), rgba(255, 140, 200, 0.5));
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        mix-blend-mode: screen;
        box-shadow:
          0 0 30px 10px #ffb6d9,
          0 0 60px 20px #ff99cc;
        transform: translate(-50%, -50%);
        transition:
          transform 0.08s ease,
          width 0.2s,
          height 0.2s,
          background 0.3s;
        animation: hueRotate 3s linear infinite;
      }

      @keyframes hueRotate {
        0% {
          filter: hue-rotate(0deg);
        }
        50% {
          filter: hue-rotate(60deg) brightness(1.2);
        }
        100% {
          filter: hue-rotate(0deg);
        }
      }

      /* ===== ПАРАЛЛАКС СЛОИ ===== */
      .parallax-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .parallax-bubble {
        position: absolute;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(2px);
        border-radius: 50%;
        box-shadow: 0 20px 40px rgba(255, 120, 160, 0.2);
        animation: float 16s infinite alternate ease-in-out;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0) scale(1);
        }
        100% {
          transform: translate(20px, -30px) scale(1.05);
        }
      }

      /* основной контент поверх параллакса */
      h1,
      p,
      .gallery,
      .cards,
      .surprise-btn,
      .flower-shower,
      .message-popup {
        z-index: 10;
        position: relative;
      }

      /* ===== ЗАГОЛОВОК ===== */
      h1 {
        font-size: clamp(2.5rem, 10vw, 4.5rem);
        font-weight: 800;
        background: linear-gradient(135deg, #d23669, #f65782, #b2456e);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 30px rgba(255, 130, 180, 0.5);
        margin-bottom: 0.25em;
        letter-spacing: -0.02em;
        animation: titleGlow 3s ease-in-out infinite;
      }

      @keyframes titleGlow {
        0%,
        100% {
          filter: drop-shadow(0 0 15px #ffb3c6);
        }
        50% {
          filter: drop-shadow(0 0 35px #ff80b0);
        }
      }

      p {
        font-size: 1.6rem;
        color: #5e3a4b;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(8px);
        padding: 0.75rem 2rem;
        border-radius: 80px;
        box-shadow: 0 10px 30px rgba(255, 180, 200, 0.4);
        margin-bottom: 2.5rem;
        font-weight: 500;
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      /* ===== ГАЛЕРЕЯ ===== */
      .gallery {
        margin: 2rem 0;
        transition: transform 0.3s;
      }

      .gallery img {
        max-width: 280px;
        width: 100%;
        height: auto;
        filter: drop-shadow(0 25px 25px rgba(230, 100, 150, 0.4));
        border-radius: 40px 40px 40px 12px;
        background: rgba(255, 245, 250, 0.6);
        backdrop-filter: blur(4px);
        padding: 12px;
        border: 2px solid rgba(255, 255, 255, 0.8);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .gallery img:hover {
        transform: scale(1.05) rotate(2deg);
        filter: drop-shadow(0 35px 30px #ffa5c3);
      }

      /* ===== КАРТОЧКИ ===== */
      .cards {
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
        justify-content: center;
        margin: 2.5rem 0 2rem;
      }

      .card {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(12px);
        border-radius: 42px;
        padding: 2rem 2.2rem;
        width: 220px;
        text-align: center;
        box-shadow: 0 30px 40px -10px rgba(200, 80, 120, 0.3);
        border: 2px solid rgba(255, 255, 255, 0.7);
        transition: all 0.3s ease;
        transform-style: preserve-3d;
        perspective: 800px;
      }

      .card:hover {
        transform: translateY(-16px) rotateX(2deg) rotateY(2deg) scale(1.02);
        box-shadow: 0 45px 60px -8px #ff9eb5;
        border-color: #ffc1d0;
        background: rgba(255, 255, 255, 0.75);
      }

      .card h3 {
        font-size: 2.1rem;
        margin-bottom: 0.6rem;
        background: linear-gradient(145deg, #b33b5c, #d4547a);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .card p {
        font-size: 1.2rem;
        background: none;
        backdrop-filter: none;
        box-shadow: none;
        padding: 0;
        color: #732e4a;
      }

      /* ===== КНОПКА-СЮРПРИЗ ===== */
      .surprise-btn {
        background: #ffb3c6;
        border: 4px solid white;
        color: #6b3b4b;
        font-size: 1.7rem;
        font-weight: bold;
        padding: 1.2rem 2.8rem;
        border-radius: 60px;
        box-shadow: 0 20px 30px #faaac9;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
        margin: 20px 0 30px;
        cursor: none;
      }

      .surprise-btn:hover {
        background: #ffc9db;
        transform: scale(1.1) translateY(-5px);
        box-shadow: 0 35px 40px #ff9ab8;
      }

      /* ===== ЦВЕТОЧНЫЙ ЛИВЕНЬ (СЮРПРИЗ) ===== */
      .flower-shower {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10000;
        overflow: hidden;
      }

      .flower {
        position: absolute;
        font-size: 2.2rem;
        opacity: 0.7;
        animation: flowerFall linear forwards;
        filter: drop-shadow(0 0 15px hotpink);
        user-select: none;
      }

      @keyframes flowerFall {
        0% {
          transform: translateY(-20vh) rotate(0deg);
          opacity: 0.9;
        }
        100% {
          transform: translateY(120vh) rotate(480deg);
          opacity: 0.2;
        }
      }

      /* ===== ВСПЛЫВАЮЩЕЕ СООБЩЕНИЕ ===== */
      .message-popup {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: rgba(255, 240, 245, 0.9);
        backdrop-filter: blur(20px);
        color: #a13e5e;
        font-size: 1.5rem;
        padding: 1.5rem 2.5rem;
        border-radius: 100px;
        border: 3px solid white;
        box-shadow: 0 10px 40px #ff87b1;
        transform: translateY(200%);
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 10001;
        font-weight: 600;
        max-width: 80vw;
        text-align: center;
      }

      .message-popup.show {
        transform: translateY(0);
      }

      /* ===== АДАПТАЦИЯ ===== */
      @media (max-width: 550px) {
        .card {
          width: 160px;
          padding: 1.5rem;
        }
        h1 {
          font-size: 3rem;
        }
        p {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- ПЕРЕЛИВАЮЩИЙСЯ КУРСОР -->
    <div class="cursor-glow" id="cursor"></div>

    <!-- ПАРАЛЛАКС СЛОИ (пузырьки / цветы) -->
    <div class="parallax-layer" id="parallaxLayer"></div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <h1>🌷 С 8 Марта, любимая мама! 🌷</h1>
    <p>Спасибо за заботу, любовь и поддержку</p>

    <div class="gallery">
      <!-- вместо реального изображения используем символ тюльпанов, т.к. файл Flowers.png может отсутствовать, но оставляем тег с эмодзи, чтобы дизайн не сломался -->
      <img
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffd1dc' /%3E%3Ctext x='18' y='70' font-size='50' fill='%23b33b5c'%3E🌷%3C/text%3E%3C/svg%3E"
        alt="Тюльпаны" />
    </div>

    <div class="cards">
      <div class="card">
        <h3>Мама</h3>
        <p>Ты всегда рядом ❤</p>
      </div>
      <div class="card">
        <h3>Подруга</h3>
        <p>Ты мой лучший друг 💖</p>
      </div>
    </div>

    <!-- КНОПКА СЮРПРИЗ -->
    <button class="surprise-btn" id="surpriseButton">🌸 сюрприз 🌸</button>

    <!-- КОНТЕЙНЕР ДЛЯ ЦВЕТОЧНОГО ЛИВНЯ -->
    <div class="flower-shower" id="flowerShower"></div>

    <!-- ВСПЛЫВАЮЩЕЕ ПОЗДРАВЛЕНИЕ -->
    <div class="message-popup" id="popupMessage">🌺 С праздником весны! 🌺</div>

    <script>
      (function () {
        // === 1. КУРСОР-ПЕРЕЛИВ ===
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
        });

        // увеличиваем курсор при наведении на кликабельные элементы
        const hoverables = document.querySelectorAll('h1, p, .card, .surprise-btn, img');
        hoverables.forEach((el) => {
          el.addEventListener('mouseenter', () => {
            cursor.style.width = '70px';
            cursor.style.height = '70px';
            cursor.style.background = 'radial-gradient(circle at 40% 40%, #ffe0f0, #ffa0d0)';
          });
          el.addEventListener('mouseleave', () => {
            cursor.style.width = '48px';
            cursor.style.height = '48px';
            cursor.style.background = 'radial-gradient(circle at 30% 30%, rgba(255, 200, 235, 0.9), rgba(255, 140, 200, 0.5))';
          });
        });

        // === 2. ПАРАЛЛАКС ГЕНЕРАЦИЯ И ДВИЖЕНИЕ ===
        const layer = document.getElementById('parallaxLayer');
        // создаём 20 случайных пузырьков / цветочных элементов
        for (let i = 0; i < 20; i++) {
          const bubble = document.createElement('div');
          bubble.classList.add('parallax-bubble');
          const size = Math.floor(Math.random() * 150 + 40); // 40-190px
          bubble.style.width = size + 'px';
          bubble.style.height = size + 'px';
          bubble.style.left = Math.random() * 100 + '%';
          bubble.style.top = Math.random() * 100 + '%';
          bubble.style.background = `radial-gradient(circle at 30% 30%, rgba(${180 + Math.random() * 70}, ${100 + Math.random() * 80}, 200, 0.25), rgba(255, 180, 200, 0.2))`;
          bubble.style.animationDelay = Math.random() * 10 + 's';
          bubble.style.animationDuration = 12 + Math.random() * 15 + 's';
          layer.appendChild(bubble);
        }

        // параллакс при движении мыши
        document.addEventListener('mousemove', (e) => {
          const x = (e.clientX / window.innerWidth - 0.5) * 30;
          const y = (e.clientY / window.innerHeight - 0.5) * 30;
          const bubbles = document.querySelectorAll('.parallax-bubble');
          bubbles.forEach((bub, index) => {
            const speed = 0.02 + (index % 5) * 0.01;
            bub.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
          });
        });

        // === 3. СЮРПРИЗЫ ===
        const surpriseBtn = document.getElementById('surpriseButton');
        const flowerContainer = document.getElementById('flowerShower');
        const popup = document.getElementById('popupMessage');

        // Цветочный ливень
        function createFlowerRain() {
          for (let i = 0; i < 35; i++) {
            const flower = document.createElement('div');
            flower.classList.add('flower');
            // эмодзи цветов
            const flowers = ['🌸', '🌼', '🌻', '🌺', '🪷', '🌷', '💐', '🌸', '🌼', '🌺'];
            flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
            flower.style.left = Math.random() * 100 + '%';
            flower.style.fontSize = Math.random() * 40 + 20 + 'px';
            flower.style.animationDuration = Math.random() * 4 + 3 + 's';
            flower.style.animationDelay = Math.random() * 0.5 + 's';
            flower.style.opacity = 0.6 + Math.random() * 0.4;
            flowerContainer.appendChild(flower);

            // удаляем после анимации
            setTimeout(() => {
              if (flower.parentNode) flower.remove();
            }, 7000);
          }
        }

        // Показываем всплывашку
        function showPopupMessage() {
          popup.classList.add('show');
          setTimeout(() => {
            popup.classList.remove('show');
          }, 3500);
        }

        // Действие по кнопке сюрприз
        surpriseBtn.addEventListener('click', () => {
          createFlowerRain(); // ливень цветов
          showPopupMessage(); // сообщение
          // дополнительно меняем фон на пару секунд
          document.body.style.transition = 'background 0.5s';
          document.body.style.background = 'linear-gradient(145deg, #ffe5f0, #ffd9ee, #ffcce7)';
          setTimeout(() => {
            document.body.style.background = 'linear-gradient(145deg, #fce4e8 0%, #ffe6f0 40%, #fff0f5 100%)';
          }, 700);
        });

        // дополнительный сюрприз — просто наведение на заголовок
        const title = document.querySelector('h1');
        title.addEventListener('mouseenter', () => {
          const msg = new SpeechSynthesisUtterance('С восьмым марта!');
          msg.lang = 'ru-RU';
          window.speechSynthesis.cancel(); // отменить предыдущие, если есть
          window.speechSynthesis.speak(msg);
        });

        // === 4. Скрыть стандартный курсор везде (уже в css), но на всякий случай дубль ===
        document.body.style.cursor = 'none';

        // === 5. Маленький сюрприз: через 2 секунды после загрузки показать popup ===
        setTimeout(() => {
          popup.classList.add('show');
          setTimeout(() => popup.classList.remove('show'), 3000);
        }, 600);
      })();
    </script>
  </body>
</html>
